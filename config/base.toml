# {{project-name}} 配置文件
# 作者: {{author_name}}

# 应用配置
app_name = "{{project-name}}"

# 日志配置
[log]
level = "info"
dir = "./logs"
prefix = "{{project-name}}"
max_files = 30
console = true
json = false

# 说明：
# - 日志级别: trace, debug, info, warn, error
# - 日志文件按天轮转，格式: {prefix}.YYYY-MM-DD.log
# - console=true 时同时输出到控制台（开发环境推荐）
# - json=true 时使用 JSON 格式（生产环境推荐）

# 你可以在此文件中添加自定义配置
# 例如：
# [server]
# host = "127.0.0.1"
# port = 8080
