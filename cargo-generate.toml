[template]
cargo_generate_version = ">=0.17.0"
ignore = [
    "cargo-generate.toml",
    "test-template.sh",
    "test-output",
    "test-lib",
    "examples",
    ".git",
    "target",
    ".idea",
    "*.iml"
]

# Conditional file inclusion: settings module
[conditional.'use_cli == false && use_settings == false']
ignore = ["src/settings.rs"]

# Conditional file inclusion: telemetry module (bundled with logging/tracing)
[conditional.'use_logging == false && use_tracing == false']
ignore = ["src/telemetry.rs", "src/metrics.rs"]

# === Placeholders ===

[placeholders.project_description]
type = "string"
prompt = "项目描述"
default = "A Rust service built with Foundations"

[placeholders.author_name]
type = "string"
prompt = "作者名称"
default = "Your Name"

[placeholders.author_email]
type = "string"
prompt = "作者邮箱"
default = "your.email@example.com"

[placeholders.use_logging]
type = "bool"
prompt = "是否接入日志 (foundations logging)? 开启后会附带遥测服务端和指标功能"
default = true

[placeholders.use_tracing]
type = "bool"
prompt = "是否开启分布式追踪 (foundations tracing)? 开启后会附带遥测服务端和指标功能"
default = false

[placeholders.use_jemalloc]
type = "bool"
prompt = "是否使用 jemalloc 内存分配器 (生产级服务推荐)?"
default = false

[placeholders.use_settings]
type = "bool"
prompt = "是否配置自文档化设置 (foundations settings, 自动生成带文档的 YAML 配置)?"
default = true

[placeholders.use_cli]
type = "bool"
prompt = "是否提供 CLI 模块 (foundations cli, 含 --help 和配置生成, 启用后将自动包含 settings)?"
default = true
